<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Comunidade</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{

    width:350px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);

}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

input, textarea{

    width:100%;
    padding:10px;

    border-radius:6px;
    border:1px solid #ccc;

}

button{

    width:100%;
    padding:12px;

    border:none;
    border-radius:6px;

    background:#ff5a3c;
    color:white;

    font-weight:bold;
    cursor:pointer;

}

button:hover{
    background:#e04a2e;
}

</style>

</head>

<body>

<div class="container">

<h2>Criar Comunidade</h2>

<div class="input-group">
<input type="text" id="nome" placeholder="Nome da comunidade">
</div>

<div class="input-group">
<textarea id="descricao" placeholder="Descrição"></textarea>
</div>

<div class="input-group">
<input type="text" id="imagem" placeholder="URL da imagem">
</div>

<button onclick="criarComunidade()">
Criar Comunidade
</button>

</div>

<script>

async function criarComunidade(){

    const nome = document.getElementById("nome").value
    const descricao = document.getElementById("descricao").value
    const imagem = document.getElementById("imagem").value

    const resposta = await fetch("http://localhost:3000/comunidades/create",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            nome,
            descricao,
            imagem
        })

    })

    const dados = await resposta.json()

    console.log(dados)

    alert("Comunidade criada!")
    

}

</script>

</body>
</html>
